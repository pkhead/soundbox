<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'"> -->

    <link href="../style.css" rel="stylesheet">

    <script>
      systemAudio.onReady(async (port) => {
        console.log(port);
        let waveformSelect = document.getElementById("waveform-select");
        waveformSelect.value = (await systemAudio.moduleParam("get", "waveform")).toString();

        waveformSelect.onchange = () => {
          console.log(port);
          port.postMessage({
            action: "set_waveform",
            value: +waveformSelect.value
          });
        };
      });
    </script>
  </head>
  <body>
    <div id="title-bar">
      <button class="exit-button" onclick="window.close()">X</button>
    </div>

    <label>waveform: </label>
    <select id="waveform-select">
      <option value="0">sine</option>
      <option value="1">triangle</option>
      <option value="2">square</option>
      <option value="3">saw</option>
    </select>
  </body>
</html>
